<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>No encontrado</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 2rem;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        h1 { font-size: 1.5rem; color: #1a1a1a; margin-bottom: 0.5rem; }
        p { color: #666; font-size: 0.95rem; line-height: 1.4; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Negocio no encontrado</h1>
        <p>El enlace que seguiste no corresponde a ningun negocio registrado. Verifica el codigo QR e intenta de nuevo.</p>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unirme a {{.Name}}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 2rem;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .logo {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 1rem;
        }
        .logo-placeholder {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #e8e8e8;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: #999;
            margin-bottom: 1rem;
        }
        h1 {
            font-size: 1.5rem;
            color: #1a1a1a;
            margin-bottom: 0.5rem;
        }
        .description {
            color: #666;
            font-size: 0.95rem;
            margin-bottom: 1.5rem;
            line-height: 1.4;
        }
        .welcome {
            color: #444;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
            font-style: italic;
        }
        .btn {
            display: inline-block;
            background: #25D366;
            color: white;
            text-decoration: none;
            padding: 0.875rem 2rem;
            border-radius: 12px;
            font-size: 1.05rem;
            font-weight: 600;
            transition: background 0.2s;
            width: 100%;
        }
        .btn:hover { background: #1fb855; }
        .footer {
            margin-top: 1.5rem;
            color: #aaa;
            font-size: 0.75rem;
        }
    </style>
</head>
<body>
    <div class="card">
        {{if .LogoURL}}
            <img class="logo" src="{{.LogoURL}}" alt="{{.Name}}">
        {{else}}
            <div class="logo-placeholder">{{slice .Name 0 1}}</div>
        {{end}}

        <h1>{{.Name}}</h1>

        {{if .Description}}
            <p class="description">{{.Description}}</p>
        {{end}}

        {{if .WelcomeMessage}}
            <p class="welcome">{{.WelcomeMessage}}</p>
        {{end}}

        <a class="btn" href="{{.DeeplinkURL}}">Unirme por WhatsApp</a>

        <p class="footer">Programa de fidelidad powered by Fidel</p>
    </div>
</body>
</html>

openapi: 3.0.3
info:
  title: Fidel Quick API
  description: API interna para gestión del sistema de fidelidad earn-burn.
  version: 1.0.0

servers:
  - url: http://localhost:8080/api/v1
    description: Local development

security:
  - BearerAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
      required: [error]

    StatusResponse:
      type: object
      properties:
        status:
          type: string
          example: updated

    IDResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid

    # --- Programs ---
    Program:
      type: object
      properties:
        id:
          type: string
          format: uuid
        customer_id:
          type: string
          format: uuid
        type:
          type: string
          example: earn_burn
        name:
          type: string
          example: Programa Cafe Roma
        points_ratio:
          type: integer
          description: Puntos otorgados por cada unidad monetaria gastada
          example: 1000
        active:
          type: boolean

    CreateProgramRequest:
      type: object
      required: [customer_id, type, name]
      properties:
        customer_id:
          type: string
          format: uuid
        type:
          type: string
          example: earn_burn
        name:
          type: string
          example: Programa Cafe Roma
        points_ratio:
          type: integer
          description: Default 1000 si no se especifica
          example: 1000

    UpdateProgramRequest:
      type: object
      description: >
        Actualiza un programa earn_burn. Los campos de config (expiry_days,
        min_ticket_amount) son FULL-REPLACE: si se omiten llegan como null y la
        columna se limpia (sin límite). El cliente debe enviar SIEMPRE todos los
        campos de config con su valor actual, incluso al alternar `active`.
      properties:
        name:
          type: string
        points_ratio:
          type: integer
        active:
          type: boolean
        expiry_days:
          type: integer
          nullable: true
          minimum: 1
          description: >
            FID-34. Días tras los cuales los puntos de una acreditación vencen.
            null = sin vencimiento. Full-replace: omitir el campo lo limpia.
          example: 90
        min_ticket_amount:
          type: number
          format: double
          nullable: true
          minimum: 0
          description: >
            FID-36. Monto mínimo de compra para acreditar puntos. null = sin
            mínimo. Full-replace: omitir el campo lo limpia.
          example: 100

    # --- Cashback programs ---
    UpdateCashbackProgramRequest:
      type: object
      description: >
        Actualiza un programa de cashback. Los campos de config (expiry_days,
        min_ticket_amount, max_cashback_per_tx, max_cashback_per_period) son
        FULL-REPLACE: si se omiten llegan como null y la columna se limpia (sin
        límite). El cliente debe enviar SIEMPRE todos los campos de config con su
        valor actual, incluso al alternar `active`.
      properties:
        name:
          type: string
        cashback_rate:
          type: number
          format: double
          description: >
            Tasa de cashback. Acepta fracción (0-1, ej. 0.05) o porcentaje (0-100,
            ej. 5, que se normaliza a 0.05). Un valor <= 0 preserva la tasa previa.
          example: 0.05
        active:
          type: boolean
        expiry_days:
          type: integer
          nullable: true
          minimum: 1
          description: >
            FID-34. Días tras los cuales el saldo de una acreditación vence.
            null = sin vencimiento. Full-replace: omitir el campo lo limpia.
          example: 90
        min_ticket_amount:
          type: number
          format: double
          nullable: true
          minimum: 0
          description: >
            FID-36. Monto mínimo de compra para acreditar cashback. null = sin
            mínimo. Full-replace: omitir el campo lo limpia.
          example: 100
        max_cashback_per_tx:
          type: number
          format: double
          nullable: true
          exclusiveMinimum: 0
          description: >
            FID-37. Techo de cashback por transacción. null = sin cap. Si se
            especifica debe ser > 0 (un 0 se rechaza; "sin cap" se expresa con
            null). Full-replace: omitir el campo lo limpia.
          example: 50
        max_cashback_per_period:
          type: number
          format: double
          nullable: true
          exclusiveMinimum: 0
          description: >
            FID-37. Techo de cashback acumulado en la ventana (expiry_days o 30
            días por defecto). null = sin cap. Si se especifica debe ser > 0. El
            techo se aplica de forma atómica al acreditar. Full-replace: omitir el
            campo lo limpia.
          example: 500

    # --- Rewards ---
    Reward:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: Cafe gratis
        description:
          type: string
        points_cost:
          type: integer
          example: 500
        active:
          type: boolean

    CreateRewardRequest:
      type: object
      required: [name, points_cost]
      properties:
        name:
          type: string
          example: Cafe gratis
        description:
          type: string
        points_cost:
          type: integer
          example: 500

    UpdateRewardRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        points_cost:
          type: integer
        active:
          type: boolean

    # --- Customers ---
    Customer:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: Cafe Roma
        slug:
          type: string
          example: cafe-roma
        phone:
          type: string
          example: "5491112345678"
        address:
          type: string
        logo_url:
          type: string
        description:
          type: string
        welcome_message:
          type: string
        active:
          type: boolean

    CreateCustomerRequest:
      type: object
      required: [name, slug, phone]
      properties:
        name:
          type: string
          example: Cafe Roma
        slug:
          type: string
          example: cafe-roma
        phone:
          type: string
          example: "5491112345678"
        address:
          type: string
        logo_url:
          type: string
        description:
          type: string
        welcome_message:
          type: string

    UpdateCustomerRequest:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        address:
          type: string
        logo_url:
          type: string
        description:
          type: string
        welcome_message:
          type: string
        active:
          type: boolean

    # --- Collaborators ---
    Collaborator:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: Juan Perez
        phone:
          type: string
          example: "5491198765432"
        hash_id:
          type: string
          description: Identificador corto para el colaborador
          example: JP001
        active:
          type: boolean

    CreateCollaboratorRequest:
      type: object
      required: [name, phone, hash_id]
      properties:
        name:
          type: string
          example: Juan Perez
        phone:
          type: string
          example: "5491198765432"
        hash_id:
          type: string
          example: JP001

    # --- Balance & Transactions ---
    Balance:
      type: object
      properties:
        client_id:
          type: string
          format: uuid
        program_id:
          type: string
          format: uuid
        balance:
          type: integer
          example: 3500

    Transaction:
      type: object
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum: [earn, burn, adjustment]
        amount:
          type: integer
          example: 500
        balance_after:
          type: integer
          example: 3500
        created_at:
          type: string
          format: date-time

    # --- Auth & Admin ---
    AdminSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        customer_id:
          type: string
          format: uuid
        google_email:
          type: string
          format: email
          nullable: true
          description: Email de la cuenta Google vinculada (si existe)
      required: [id, email, customer_id]

    AuthResponse:
      type: object
      properties:
        token:
          type: string
          description: JWT de 72h para autenticar peticiones subsiguientes
        admin:
          $ref: "#/components/schemas/AdminSummary"
      required: [token, admin]

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6

    RegisterRequest:
      type: object
      required: [email, password, customer_id]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        customer_id:
          type: string
          format: uuid

    GoogleLoginRequest:
      type: object
      required: [google_token]
      properties:
        google_token:
          type: string
          description: ID token (JWT) emitido por Google Identity Services

    OnboardingRegisterRequest:
      type: object
      required: [name, phone, admin_email, admin_password]
      properties:
        name:
          type: string
        phone:
          type: string
        description:
          type: string
        admin_email:
          type: string
          format: email
        admin_password:
          type: string
          minLength: 8

    GoogleOnboardingRequest:
      type: object
      required: [google_token, name, phone]
      properties:
        google_token:
          type: string
        name:
          type: string
        phone:
          type: string
        description:
          type: string

    LinkGoogleRequest:
      type: object
      required: [google_token]
      properties:
        google_token:
          type: string

    ForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    ResetPasswordRequest:
      type: object
      required: [token, new_password]
      properties:
        token:
          type: string
          description: Token del enlace enviado por email
        new_password:
          type: string
          minLength: 8

    MessageResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string

    # --- Feedback ---
    Feedback:
      type: object
      properties:
        id:
          type: string
          format: uuid
        message:
          type: string
        client_name:
          type: string
        created_at:
          type: string
          format: date-time

paths:
  # ========== Auth ==========
  /auth/login:
    post:
      tags: [Auth]
      summary: Login con email + password
      description: Autentica un admin existente y devuelve un JWT de 72h.
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Credenciales válidas
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Body inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Credenciales inválidas o admin no encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/login/google:
    post:
      tags: [Auth]
      summary: Login con Google (ID token)
      description: |
        Verifica el ID token contra la JWKS pública de Google y emite un JWT propio.
        Si el `sub` aún no está vinculado pero el email coincide con un admin existente,
        se vincula automáticamente.
      operationId: loginGoogle
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GoogleLoginRequest"
      responses:
        "200":
          description: Login exitoso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: google_token faltante
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Token inválido, audience mismatch, email no verificado, o admin no encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/register:
    post:
      tags: [Auth]
      summary: Crear admin para un customer existente
      description: |
        Endpoint público que crea un nuevo admin asociado a un `customer_id` ya existente.
        Para crear el customer + admin a la vez, usar `/onboarding/register`.
      operationId: register
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Admin creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Body inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Email ya registrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/forgot-password:
    post:
      tags: [Auth]
      summary: Solicitar restablecimiento de contraseña
      description: |
        Endpoint público. Si el email está registrado, envía un correo con un
        enlace de restablecimiento (token de un solo uso, válido 1 hora).
        Responde **200 siempre** — incluso si el email no existe — para no
        revelar qué correos están registrados. Rate limit: 5/h por email.
      operationId: forgotPassword
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordRequest"
      responses:
        "200":
          description: Solicitud aceptada (mensaje neutro)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Email faltante o inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          description: Demasiadas solicitudes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/reset-password:
    post:
      tags: [Auth]
      summary: Restablecer contraseña con token
      description: |
        Endpoint público. Valida el token del enlace (existe, no expirado, no
        usado), fija la nueva contraseña (min 8 caracteres) y marca el token
        como usado — invalidando además cualquier otro token pendiente del
        admin. Rate limit: 10/h por IP.
      operationId: resetPassword
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordRequest"
      responses:
        "200":
          description: Contraseña actualizada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Token inválido/expirado/usado o contraseña muy corta
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          description: Demasiadas solicitudes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/link/google:
    post:
      tags: [Auth]
      summary: Vincular cuenta Google al admin actual
      description: |
        Asocia el `sub` del ID token de Google al admin identificado por el JWT.
        Permite hacer login posterior con Google sin perder la contraseña.
      operationId: linkGoogle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LinkGoogleRequest"
      responses:
        "200":
          description: Vinculación exitosa
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSummary"
        "400":
          description: google_token faltante o JWT sin admin_id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: ID token de Google inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: La cuenta Google ya está vinculada a otro admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      tags: [Auth]
      summary: Desvincular cuenta Google del admin actual
      operationId: unlinkGoogle
      responses:
        "200":
          description: Desvinculado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSummary"
        "400":
          description: JWT sin admin_id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/me:
    get:
      tags: [Auth]
      summary: Devuelve el admin del JWT actual
      description: Útil para refrescar estado de vinculación con Google después de un link/unlink.
      operationId: getMe
      responses:
        "200":
          description: Admin actual
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSummary"
        "400":
          description: JWT sin admin_id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ========== Onboarding ==========
  /onboarding/register:
    post:
      tags: [Onboarding]
      summary: Crear customer + admin (signup con email/password)
      description: |
        Endpoint público que crea un negocio nuevo (`customer`) junto con su primer admin.
        Genera un slug único derivado del nombre.
      operationId: onboardingRegister
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OnboardingRegisterRequest"
      responses:
        "201":
          description: Negocio + admin creados
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Body inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Email ya registrado o slug colisionando
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /onboarding/register/google:
    post:
      tags: [Onboarding]
      summary: Crear customer + admin (signup con Google)
      description: |
        Verifica el ID token de Google, crea el customer y un admin con `google_sub` poblado.
        El admin no tiene contraseña — autenticación posterior es solo con Google
        (o vinculando una contraseña vía endpoints futuros).
      operationId: onboardingGoogle
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GoogleOnboardingRequest"
      responses:
        "201":
          description: Negocio + admin creados
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Body inválido o ID token inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Email ya registrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ========== Programs ==========
  /programs:
    get:
      tags: [Programs]
      summary: Listar todos los programas
      operationId: listPrograms
      responses:
        "200":
          description: Lista de programas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Program"
        "401":
          description: No autorizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    post:
      tags: [Programs]
      summary: Crear un programa de fidelidad
      operationId: createProgram
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProgramRequest"
      responses:
        "201":
          description: Programa creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IDResponse"
        "400":
          description: Datos invalidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /programs/{id}:
    put:
      tags: [Programs]
      summary: Actualizar un programa
      operationId: updateProgram
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProgramRequest"
      responses:
        "200":
          description: Programa actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"

  /cashback-programs/{id}:
    put:
      tags: [Programs]
      summary: Actualizar un programa de cashback
      description: >
        Actualiza name, cashback_rate, active y los límites de config (FID-34/36/37).
        Los cuatro límites (expiry_days, min_ticket_amount, max_cashback_per_tx,
        max_cashback_per_period) son FULL-REPLACE: un campo omitido llega como null
        y limpia la columna. Envía SIEMPRE todos los campos de config actuales,
        incluso al solo alternar `active`. Los caps, si se especifican, deben ser > 0.
      operationId: updateCashbackProgram
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCashbackProgramRequest"
      responses:
        "200":
          description: Programa de cashback actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "400":
          description: Datos inválidos (p.ej. un cap <= 0)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ========== Rewards ==========
  /programs/{id}/rewards:
    get:
      tags: [Rewards]
      summary: Listar recompensas de un programa
      operationId: listRewards
      parameters:
        - name: id
          in: path
          required: true
          description: ID del programa
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Lista de recompensas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Reward"

    post:
      tags: [Rewards]
      summary: Crear una recompensa
      operationId: createReward
      parameters:
        - name: id
          in: path
          required: true
          description: ID del programa
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRewardRequest"
      responses:
        "201":
          description: Recompensa creada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IDResponse"
        "404":
          description: Programa no encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /programs/{id}/rewards/{reward_id}:
    put:
      tags: [Rewards]
      summary: Actualizar una recompensa
      operationId: updateReward
      parameters:
        - name: id
          in: path
          required: true
          description: ID del programa
          schema:
            type: string
            format: uuid
        - name: reward_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRewardRequest"
      responses:
        "200":
          description: Recompensa actualizada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"

  # ========== Client Balance & Transactions ==========
  /programs/{id}/clients/{client_id}/balance:
    get:
      tags: [Clients]
      summary: Consultar balance de puntos de un cliente
      operationId: getClientBalance
      parameters:
        - name: id
          in: path
          required: true
          description: ID del programa
          schema:
            type: string
            format: uuid
        - name: client_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Balance del cliente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Balance"

  /programs/{id}/clients/{client_id}/transactions:
    get:
      tags: [Clients]
      summary: Listar transacciones de puntos de un cliente
      operationId: getClientTransactions
      parameters:
        - name: id
          in: path
          required: true
          description: ID del programa
          schema:
            type: string
            format: uuid
        - name: client_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Lista de transacciones (max 50)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Transaction"

  # ========== Customers ==========
  /customers:
    post:
      tags: [Customers]
      summary: Crear un negocio (customer)
      operationId: createCustomer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCustomerRequest"
      responses:
        "201":
          description: Customer creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IDResponse"
        "400":
          description: Datos invalidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /customers/{id}:
    get:
      tags: [Customers]
      summary: Obtener un negocio por ID
      operationId: getCustomer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Datos del customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
        "404":
          description: No encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    put:
      tags: [Customers]
      summary: Actualizar un negocio
      operationId: updateCustomer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCustomerRequest"
      responses:
        "200":
          description: Customer actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"

  # ========== Collaborators ==========
  /customers/{id}/collaborators:
    post:
      tags: [Collaborators]
      summary: Crear un colaborador
      operationId: createCollaborator
      parameters:
        - name: id
          in: path
          required: true
          description: ID del customer
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCollaboratorRequest"
      responses:
        "201":
          description: Colaborador creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IDResponse"

    get:
      tags: [Collaborators]
      summary: Listar colaboradores de un negocio
      operationId: listCollaborators
      parameters:
        - name: id
          in: path
          required: true
          description: ID del customer
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Lista de colaboradores
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Collaborator"

